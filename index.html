<!DOCTYPE html>
<html>
  <title>Kai</title>
  <head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/two.js/0.7.0/two.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Quicksand"/>
    <link rel="stylesheet" href="css/style.css"/>
    <link rel="preload" as="image" href="./assets/about-cover.JPG"/>
  </head>
  <body>
    <div id="app">
      <router-view></router-view>

      <script type="text/x-template" id="home">
        <main style="display: flex; justify-content: center; align-items: center;">
          <div class="panel" style="display: flex; height: 386px;">
            <div id="left-text" style="display: flex; align-items: center; margin-right: 50px;">
              projects
            </div>
            <div class="diamond">
              <div style="padding-top: 85px; padding-left: 120px;">
                <div id="left-rectangle" class="rectangle hvr-grow"></div>
              </div>
            </div>
            <div>
              <div id="top-text" style="display: flex; margin-bottom: 50px; justify-content: center;">
                about
              </div>
              <div class="diamond" style="position: relative; z-index: 1">
                <div>
                  <div @click="navigate('about')" id="top-rectangle" class="rectangle hvr-grow"></div>
                </div>
              </div>
            </div>
            <div class="diamond">
              <div style="padding-top: 120px; padding-left: 85px;">
                <div id="right-rectangle" class="rectangle hvr-grow"></div>
              </div>
            </div>
            <div id="right-text" style="display: flex; align-items: center; margin-left: 50px;">
              experience/skills
            </div>
          </div>
        </main>
      </script>

      <script type="text/x-template" id="about">
        <main>
          <div style="height: 100%; display: grid; grid-template-columns: auto; grid-template-rows: 25% 400px 200px auto">
            <div style="display: flex; align-items: flex-end; justify-content: center;">
              <div class="header-text" style="padding-bottom: 50px;">
                about me
              </div>
            </div>
            <div style="display: flex; align-items: center; justify-content: center;">
              <div style="height:400px; width:400px; border-radius: 100%; overflow: hidden;">
                <img style="width: 494px; margin-left: -18%; margin-top: -10%" class="animate__animated animate__fadeIn" src="./assets/about-cover.JPG"/>
              </div>
            </div>
            <div style="display: flex; padding-top: 50px;">
              <ul class="dock" style="display: flex; flex-direction: row; padding: unset;">
                <li @click="selectSection('education')" class="dock-item" style="display: grid; grid-template-columns: 1fr;">
                  <div class="text">education</div>
                  <div class="icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="black" width="18px" height="18px"><path d="M0 0h24v24H0z" fill="none"/><path d="M5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82zM12 3L1 9l11 6 9-4.91V17h2V9L12 3z"/></svg></div>
                  <div class="diamond">
                    <div>
                      <div class="rectangle"></div>
                    </div>
                  </div>
                </li>
                <li @click="selectSection('interests')" class="dock-item" style="display: grid; grid-template-columns: 1fr;">
                  <div class="text">interests</div>
                  <div class="icon"><svg xmlns="http://www.w3.org/2000/svg" enable-background="new 0 0 24 24" viewBox="0 0 24 24" fill="black" width="18px" height="18px"><g><rect fill="none" height="24" width="24"/></g><g><g/><path d="M12,3c-0.46,0-0.93,0.04-1.4,0.14C7.84,3.67,5.64,5.9,5.12,8.66c-0.48,2.61,0.48,5.01,2.22,6.56C7.77,15.6,8,16.13,8,16.69 V19c0,1.1,0.9,2,2,2h0.28c0.35,0.6,0.98,1,1.72,1s1.38-0.4,1.72-1H14c1.1,0,2-0.9,2-2v-2.31c0-0.55,0.22-1.09,0.64-1.46 C18.09,13.95,19,12.08,19,10C19,6.13,15.87,3,12,3z M14,19h-4v-1h4V19z M14,17h-4v-1h4V17z M12.5,11.41V14h-1v-2.59L9.67,9.59 l0.71-0.71L12,10.5l1.62-1.62l0.71,0.71L12.5,11.41z"/></g></svg></div>
                  <div class="diamond">
                    <div>
                      <div class="rectangle"></div>
                    </div>
                  </div>
                </li>
                <li @click="selectSection('backpack')" class="dock-item" style="display: grid; grid-template-columns: 1fr;">
                  <div class="text">backpack</div>
                  <div class="icon"><svg xmlns="http://www.w3.org/2000/svg" enable-background="new 0 0 24 24" viewBox="0 0 24 24" fill="black" width="18px" height="18px"><rect fill="none" height="24" width="24"/><g><path d="M17,6h-2V3c0-0.55-0.45-1-1-1h-4C9.45,2,9,2.45,9,3v3H7C5.9,6,5,6.9,5,8v11c0,1.1,0.9,2,2,2c0,0.55,0.45,1,1,1 c0.55,0,1-0.45,1-1h6c0,0.55,0.45,1,1,1c0.55,0,1-0.45,1-1c1.1,0,2-0.9,2-2V8C19,6.9,18.1,6,17,6z M9.5,18H8V9h1.5V18z M12.75,18 h-1.5V9h1.5V18z M13.5,6h-3V3.5h3V6z M16,18h-1.5V9H16V18z"/></g></svg></div>
                  <div class="diamond">
                    <div>
                      <div class="rectangle"></div>
                    </div>
                  </div>
                </li>
                <li @click="selectSection('map')" class="dock-item" style="display: grid; grid-template-columns: 1fr;">
                  <div class="text">map</div>
                  <div class="icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="black" width="18px" height="18px"><path d="M0 0h24v24H0z" fill="none"/><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg></div>
                  <div class="diamond">
                    <div>
                      <div class="rectangle"></div>
                    </div>
                  </div>
                </li>
                <li @click="selectSection('pics')" class="dock-item" style="display: grid; grid-template-columns: 1fr;">
                  <div class="text">pics</div>
                  <div class="icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="black" width="18px" height="18px"><path d="M0 0h24v24H0z" fill="none"/><circle cx="12" cy="12" r="3.2"/><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg></div>
                  <div class="diamond">
                    <div>
                      <div class="rectangle"></div>
                    </div>
                  </div>
                </li>
                <li @click="selectSection('resume')" class="dock-item" style="display: grid; grid-template-columns: 1fr;">
                  <div class="text">resume</div>
                  <div class="icon"><svg xmlns="http://www.w3.org/2000/svg" enable-background="new 0 0 24 24" viewBox="0 0 24 24" fill="black" width="18px" height="18px"><g><rect fill="none" height="24" width="24"/><path d="M20.41,8.41l-4.83-4.83C15.21,3.21,14.7,3,14.17,3H5C3.9,3,3,3.9,3,5v14c0,1.1,0.9,2,2,2h14c1.1,0,2-0.9,2-2V9.83 C21,9.3,20.79,8.79,20.41,8.41z M7,7h7v2H7V7z M17,17H7v-2h10V17z M17,13H7v-2h10V13z"/></g></svg></div>
                  <div class="diamond">
                    <div>
                      <div class="rectangle"></div>
                    </div>
                  </div>
                </li>
              </ul>
            </div>
            <div style="display: flex; justify-content: center">
              <div class="card" style="width: 50%;">
                <!-- <transition-group name="fade">
                  <div v-if="section === 'education'" key="education">
                    <div v-html="cardContent"></div>
                  </div>
                  <div v-if="section === 'interests'" key="interests">
                    <div v-html="cardContent"></div>
                  </div>
                </transition-group> -->
                <transition name="fade" mode="out-in">
                  <div :key="section">
                    <div v-html="cardContent"></div>
                  </div>
                </transition>
              </div>
            </div>
          </div>
        </main>
      </script>
    </div>
    <script type="module" src="./index.js"></script>
  </body>
</html>
