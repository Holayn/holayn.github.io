<!DOCTYPE html>
<html>
  <title>Kai</title>
  <head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/two.js/0.7.0/two.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Quicksand"/>
    <link rel="stylesheet" href="css/style.css"/>
    <link rel="preload" as="image" href="./assets/about-cover.JPG"/>
  </head>
  <body>
    <div id="app">
      <transition name="fade" mode="out-in">
        <router-view></router-view>
      </transition>

      <script type="text/x-template" id="home">
        <main style="display: flex; justify-content: center; align-items: center;">
          <div class="panel" style="display: flex; height: 386px;">
            <div id="left-text" style="display: flex; align-items: center; margin-right: 50px;">
              projects
            </div>
            <div class="diamond">
              <div style="padding-top: 85px; padding-left: 120px;">
                <div id="left-rectangle" class="rectangle hvr-grow"></div>
              </div>
            </div>
            <div>
              <div id="top-text" style="display: flex; margin-bottom: 50px; justify-content: center;">
                about
              </div>
              <div class="diamond" style="position: relative; z-index: 1">
                <div>
                  <div @click="navigate('about')" id="top-rectangle" class="rectangle hvr-grow"></div>
                </div>
              </div>
            </div>
            <div class="diamond">
              <div style="padding-top: 120px; padding-left: 85px;">
                <div id="right-rectangle" class="rectangle hvr-grow"></div>
              </div>
            </div>
            <div id="right-text" style="display: flex; align-items: center; margin-left: 50px;">
              experience/skills
            </div>
          </div>
        </main>
      </script>

      <script type="text/x-template" id="about">
        <main>
          <div style="height: 100%; display: grid; grid-template-columns: auto; grid-template-rows: 25px 25% 400px 200px auto">
            <div @click="navigate({name: 'home'})" style="display: flex; justify-content: center; cursor: pointer;">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#C9ADA7" width="36px" height="36px"><path d="M0 0h24v24H0z" fill="none"/><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            </div>
            <div style="display: flex; align-items: flex-end; justify-content: center;">
              <div class="header-text" style="padding-bottom: 50px;">
                about me
              </div>
            </div>
            <div style="display: flex; align-items: center; justify-content: center;">
              <div style="height:400px; width:400px; border-radius: 100%; overflow: hidden;">
                <img style="width: 494px; margin-left: -18%; margin-top: -10%" class="animate__animated animate__fadeIn" src="./assets/about-cover.JPG"/>
              </div>
            </div>
            <div style="display: flex; padding-top: 50px;">
              <ul class="dock" style="display: flex; flex-direction: row; padding: unset;">
                <about-dock-item @click.native="selectSection('education')" :selectedSection="section" :section="'education'" :icon="educationIcon"></about-dock-item>
                <about-dock-item @click.native="selectSection('interests')" :selectedSection="section" :section="'interests'" :icon="interestsIcon"></about-dock-item>
                <about-dock-item @click.native="selectSection('backpack')" :selectedSection="section" :section="'backpack'" :icon="backpackIcon"></about-dock-item>
                <about-dock-item @click.native="selectSection('map')" :selectedSection="section" :section="'map'" :icon="mapIcon"></about-dock-item>
                <about-dock-item @click.native="selectSection('pics')" :selectedSection="section" :section="'pics'" :icon="picsIcon"></about-dock-item>
                <about-dock-item @click.native="selectSection('resume')" :selectedSection="section" :section="'resume'" :icon="resumeIcon"></about-dock-item>
              </ul>
            </div>
            <div style="display: flex; justify-content: center">
              <div class="card" style="width: 50%;">
                <transition name="fade" mode="out-in">
                  <div :key="section">
                    <div v-html="cardContent"></div>
                  </div>
                </transition>
              </div>
            </div>
          </div>
        </main>
      </script>
    </div>
    <script type="module" src="./index.js"></script>
  </body>
</html>
